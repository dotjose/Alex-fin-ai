# Production deploy: ECR digest → Terraform (remote S3 state) → infra.json → Next build → S3 sync --delete → CloudFront invalidation.
#
# Rules:
# - Never use secrets.* (or vars.* that indirectly embed secrets) in step/job "if:". Use step outputs only.
# - AWS auth: exactly one mode via repository variable AWS_AUTH_MODE = "oidc" | "keys" (default oidc when unset).
# - Remote state: bucket/table/key come from GitHub repository variables (not Terraform variables).
# - Public URLs for the browser: only from terraform output -json (infra.json), never hardcoded in the repo.

name: Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  ci:
    name: CI (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Backend tests
        working-directory: backend
        run: uv sync && uv run pytest tests/ -q
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend lint + typecheck
        working-directory: frontend
        run: npm ci && npm run lint && npm run typecheck

  deploy-production:
    name: Deploy (main / manual)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_node_env: production
      TF_VAR_clerk_secret_key: ${{ secrets.CLERK_SECRET_KEY }}
      TF_VAR_supabase_url: ${{ secrets.SUPABASE_URL }}
      TF_VAR_supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TF_VAR_supabase_database_url: ${{ secrets.SUPABASE_DATABASE_URL }}
      TF_VAR_openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
      TF_VAR_or_model_simple: ${{ vars.OR_MODEL_SIMPLE }}
      TF_VAR_or_model_fast: ${{ vars.OR_MODEL_FAST }}
      TF_VAR_or_model_reasoning: ${{ vars.OR_MODEL_REASONING }}
      TF_VAR_or_model_embedding: ${{ vars.OR_MODEL_EMBEDDING }}
      TF_VAR_polygon_api_key: ${{ secrets.POLYGON_API_KEY }}
      TF_VAR_langfuse_public_key: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      TF_VAR_langfuse_secret_key: ${{ secrets.LANGFUSE_SECRET_KEY }}
      TF_VAR_langfuse_host: ${{ vars.LANGFUSE_HOST }}
      TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
      TF_VAR_clerk_jwt_issuer: ${{ secrets.CLERK_JWT_ISSUER }}
      TF_VAR_clerk_jwt_audience: ${{ secrets.CLERK_JWT_AUDIENCE }}
    steps:
      - uses: actions/checkout@v4

      - name: Preflight (repository variables for state + region)
        env:
          AWS_REGION_VAR: ${{ vars.AWS_REGION }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}
        run: |
          set -euo pipefail
          if [ -z "${AWS_REGION_VAR:-}" ]; then echo "::error::Set GitHub repository variable AWS_REGION"; exit 1; fi
          if [ -z "${TF_STATE_BUCKET:-}" ]; then echo "::error::Set GitHub repository variable TF_STATE_BUCKET (S3 bucket for Terraform state)"; exit 1; fi
          if [ -z "${TF_STATE_LOCK_TABLE:-}" ]; then echo "::error::Set GitHub repository variable TF_STATE_LOCK_TABLE (DynamoDB table for state locking)"; exit 1; fi

      - name: Resolve AWS auth mode (output only — safe for if:)
        id: aws_auth
        env:
          RAW_MODE: ${{ vars.AWS_AUTH_MODE }}
        run: |
          set -euo pipefail
          m="${RAW_MODE:-oidc}"
          case "$m" in
            oidc|keys) echo "mode=${m}" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "::error::Invalid AWS_AUTH_MODE '${m}'. Use oidc or keys."
              exit 1
              ;;
          esac

      - name: Validate credentials for selected AWS auth mode
        env:
          MODE: ${{ steps.aws_auth.outputs.mode }}
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          if [ "$MODE" = "oidc" ]; then
            if [ -z "${AWS_ROLE_ARN:-}" ]; then
              echo "::error::AWS_AUTH_MODE=oidc requires secret AWS_ROLE_ARN"
              exit 1
            fi
          else
            if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
              echo "::error::AWS_AUTH_MODE=keys requires secrets AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY"
              exit 1
            fi
          fi

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Backend tests
        working-directory: backend
        run: uv sync && uv run pytest tests/ -q

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend lint + typecheck
        working-directory: frontend
        run: npm ci && npm run lint && npm run typecheck

      - name: Configure AWS credentials (OIDC)
        if: steps.aws_auth.outputs.mode == 'oidc'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (static keys)
        if: steps.aws_auth.outputs.mode == 'keys'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push API image (ECR digest pinned for Lambda)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPO: ${{ secrets.ECR_REPOSITORY }}
          TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${REPO:-}" ]; then echo "::error::Set secret ECR_REPOSITORY to the ECR repository name (not a URL)"; exit 1; fi
          IMAGE_TAG="${REGISTRY}/${REPO}:${TAG}"
          docker build -f apps/api/Dockerfile -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
          DIGEST="$(aws ecr describe-images --repository-name "$REPO" --region "${AWS_REGION}" \
            --image-ids "imageTag=${TAG}" --query 'imageDetails[0].imageDigest' --output text)"
          if [ -z "$DIGEST" ] || [ "$DIGEST" = "None" ]; then
            echo "::error::Could not resolve ECR image digest for ${REPO}:${TAG}"
            exit 1
          fi
          echo "IMAGE_URI=${REGISTRY}/${REPO}@${DIGEST}" >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: ${{ runner.os }}-terraform-${{ hashFiles('terraform/.terraform.lock.hcl') }}

      - name: Write Terraform S3 backend config (from repository variables)
        working-directory: terraform
        env:
          BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}
          KEY: ${{ vars.TF_STATE_KEY }}
          AWS_REGION_VALUE: ${{ vars.AWS_REGION }}
        run: |
          set -euo pipefail
          STATE_KEY="${KEY:-alex-financial-adviser/terraform.tfstate}"
          cat > cideploy.backend.hcl <<EOF
          bucket         = "${BUCKET}"
          key            = "${STATE_KEY}"
          region         = "${AWS_REGION_VALUE}"
          dynamodb_table = "${TABLE}"
          encrypt        = true
          EOF

      - name: Terraform init
        working-directory: terraform
        run: terraform init -input=false -backend-config=cideploy.backend.hcl

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan (phase 1 — infra without CloudFront-scoped CORS)
        working-directory: terraform
        env:
          TF_VAR_api_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_worker_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_api_base_url: ""
          TF_VAR_frontend_url: ""
          TF_VAR_cors_allow_origin_primary: ""
        run: terraform plan -out=tfplan1 -input=false

      - name: Terraform apply (phase 1, with retries)
        working-directory: terraform
        env:
          TF_VAR_api_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_worker_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_api_base_url: ""
          TF_VAR_frontend_url: ""
          TF_VAR_cors_allow_origin_primary: ""
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if terraform apply -auto-approve -input=false tfplan1; then
              exit 0
            fi
            echo "Terraform apply phase 1 failed (attempt ${attempt}); backing off 30s..."
            sleep 30
          done
          echo "::error::Terraform apply phase 1 failed after 3 attempts"
          exit 1

      - name: Verify SQS → Lambda mapping
        working-directory: terraform
        run: |
          set -euo pipefail
          FN="$(terraform output -raw planner_worker_lambda_name)"
          MAP_COUNT="$(aws lambda list-event-source-mappings --function-name "$FN" --query 'length(EventSourceMappings)' --output text)"
          if [ -z "$MAP_COUNT" ] || [ "$MAP_COUNT" = "0" ]; then
            echo "::error::No SQS event source mapping for worker $FN"
            exit 1
          fi

      - name: Resolve CloudFront URL for phase 2 (CORS + Lambda env)
        id: public_urls
        working-directory: terraform
        run: |
          set -euo pipefail
          CF="$(terraform output -raw cloudfront_url)"
          echo "cloudfront_url=$CF" >> "$GITHUB_OUTPUT"

      - name: Terraform plan (phase 2 — CORS + public URLs from CloudFront)
        working-directory: terraform
        env:
          TF_VAR_api_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_worker_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_api_base_url: ${{ steps.public_urls.outputs.cloudfront_url }}
          TF_VAR_frontend_url: ${{ steps.public_urls.outputs.cloudfront_url }}
          TF_VAR_cors_allow_origin_primary: ${{ steps.public_urls.outputs.cloudfront_url }}
        run: terraform plan -out=tfplan2 -input=false

      - name: Terraform apply (phase 2, with retries)
        working-directory: terraform
        env:
          TF_VAR_api_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_worker_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_api_base_url: ${{ steps.public_urls.outputs.cloudfront_url }}
          TF_VAR_frontend_url: ${{ steps.public_urls.outputs.cloudfront_url }}
          TF_VAR_cors_allow_origin_primary: ${{ steps.public_urls.outputs.cloudfront_url }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if terraform apply -auto-approve -input=false tfplan2; then
              exit 0
            fi
            echo "Terraform apply phase 2 failed (attempt ${attempt}); backing off 30s..."
            sleep 30
          done
          echo "::error::Terraform apply phase 2 failed after 3 attempts"
          exit 1

      - name: Terraform output JSON (infra contract)
        run: terraform -chdir=terraform output -json > "$GITHUB_WORKSPACE/infra.json"

      - name: Assert Terraform outputs and derive Next public API URL
        id: infra
        env:
          NEXT_PUBLIC_API_ORIGIN: ${{ vars.NEXT_PUBLIC_API_ORIGIN }}
        run: |
          set -euo pipefail
          INFRA="$GITHUB_WORKSPACE/infra.json"
          need() {
            local jpath="$1"
            local name="$2"
            local v
            v="$(jq -e -r "${jpath}" "$INFRA")" || { echo "::error::Missing output: $name"; exit 1; }
            if [ -z "$v" ] || [ "$v" = "null" ]; then echo "::error::Empty output: $name"; exit 1; fi
            printf '%s' "$v"
          }
          API_BASE="$(need '.api_base_url.value' api_base_url)"
          CF_URL="$(need '.cloudfront_url.value' cloudfront_url)"
          APIGW="$(need '.api_gateway_url.value' api_gateway_url)"
          SQS_URL="$(need '.sqs_queue_url.value' sqs_queue_url)"
          S3_UI="$(jq -e -r '(.s3_bucket_ui.value // .s3_bucket.value)' "$INFRA")" || { echo "::error::Missing s3_bucket_ui / s3_bucket"; exit 1; }
          if [ -z "$S3_UI" ] || [ "$S3_UI" = "null" ]; then echo "::error::Empty S3 UI bucket output"; exit 1; fi
          jq -e '.lambda_function_arns.value.api' "$INFRA" >/dev/null || { echo "::error::lambda_function_arns.api missing"; exit 1; }
          jq -e '.lambda_function_arns.value.planner_worker' "$INFRA" >/dev/null || { echo "::error::lambda_function_arns.planner_worker missing"; exit 1; }
          ORIGIN="${NEXT_PUBLIC_API_ORIGIN:-cloudfront}"
          case "$ORIGIN" in
            cloudfront) NEXT_PUBLIC_API_URL="$API_BASE" ;;
            apigateway) NEXT_PUBLIC_API_URL="$APIGW" ;;
            *)
              echo "::error::Invalid NEXT_PUBLIC_API_ORIGIN '${ORIGIN}'. Use cloudfront or apigateway."
              exit 1
              ;;
          esac
          {
            echo "api_base_url=$API_BASE"
            echo "cloudfront_url=$CF_URL"
            echo "api_gateway_url=$APIGW"
            echo "sqs_queue_url=$SQS_URL"
            echo "s3_bucket_ui=$S3_UI"
            echo "next_public_api_url=$NEXT_PUBLIC_API_URL"
            echo "infra_contract_ok=true"
          } >> "$GITHUB_OUTPUT"

      - name: Build frontend (production)
        working-directory: frontend
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ${{ steps.infra.outputs.next_public_api_url }}
          NEXT_PUBLIC_APP_URL: ${{ steps.infra.outputs.cloudfront_url }}
          CLERK_PK_A: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_PK_B: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          export NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="${CLERK_PK_A:-${CLERK_PK_B}}"
          if [ -z "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" ]; then
            echo "::error::Set secret NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY (or legacy CLERK_PUBLISHABLE_KEY)"
            exit 1
          fi
          npm run build

      - name: Upload UI to S3 (sync, delete removed objects)
        env:
          S3_BUCKET: ${{ steps.infra.outputs.s3_bucket_ui }}
        run: aws s3 sync "$GITHUB_WORKSPACE/frontend/out/" "s3://${S3_BUCKET}/" --delete --region "${AWS_REGION}"

      - name: Invalidate CloudFront (only after successful upload; with retries)
        working-directory: terraform
        run: |
          set -euo pipefail
          DIST="$(terraform output -raw cloudfront_distribution_id)"
          for i in 1 2 3; do
            if aws cloudfront create-invalidation --distribution-id "$DIST" --paths "/*" --no-cli-pager; then
              exit 0
            fi
            echo "CloudFront invalidation attempt $i failed; retrying in 15s..."
            sleep 15
          done
          echo "::error::CloudFront invalidation failed after 3 attempts"
          exit 1
