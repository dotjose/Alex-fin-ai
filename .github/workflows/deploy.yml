# Infra-driven production deploy: ECR image → Terraform (remote state) → infra.json → Next build → S3 + CloudFront.
# No production URLs in git; Terraform outputs are the contract for runtime and browser env.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Preflight (vars + auth)
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION_VAR: ${{ vars.AWS_REGION }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}
        run: |
          set -euo pipefail
          if [ -z "${AWS_REGION_VAR:-}" ]; then echo "::error::Set repository variable AWS_REGION"; exit 1; fi
          if [ -z "${TF_STATE_BUCKET:-}" ]; then echo "::error::Set repository variable TF_STATE_BUCKET"; exit 1; fi
          if [ -z "${TF_STATE_LOCK_TABLE:-}" ]; then echo "::error::Set repository variable TF_STATE_LOCK_TABLE"; exit 1; fi
          if [ -n "${AWS_ROLE_ARN:-}" ]; then
            echo "AWS auth=OIDC"
          elif [ -n "${AWS_ACCESS_KEY_ID:-}" ] && [ -n "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "AWS auth=access keys"
          else
            echo "::error::Set AWS_ROLE_ARN (OIDC) or AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY"; exit 1
          fi

      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install and test (backend)
        working-directory: backend
        run: uv sync && uv run pytest tests/ -q

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install, lint, and typecheck (frontend)
        working-directory: frontend
        run: npm ci && npm run lint && npm run typecheck

      - name: Configure AWS credentials (OIDC)
        if: ${{ secrets.AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (access keys)
        if: ${{ secrets.AWS_ROLE_ARN == '' && secrets.AWS_ACCESS_KEY_ID != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push container image
        env:
          IMAGE_URI: ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
        run: |
          docker build -f apps/api/Dockerfile -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Write Terraform S3 backend config (CI)
        working-directory: terraform
        env:
          BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}
          KEY: ${{ vars.TF_STATE_KEY }}
          AWS_REGION_VALUE: ${{ vars.AWS_REGION }}
        run: |
          set -euo pipefail
          STATE_KEY="${KEY:-alex-financial-adviser/terraform.tfstate}"
          cat > cideploy.backend.hcl <<EOF
          bucket         = "${BUCKET}"
          key            = "${STATE_KEY}"
          region         = "${AWS_REGION_VALUE}"
          dynamodb_table = "${TABLE}"
          encrypt        = true
          EOF

      - name: Terraform init
        working-directory: terraform
        run: terraform init -input=false -backend-config=cideploy.backend.hcl

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan (phase 1)
        working-directory: terraform
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_api_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_worker_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_node_env: production
          TF_VAR_api_base_url: ""
          TF_VAR_frontend_url: ""
          TF_VAR_cors_allow_origin_primary: ""
          TF_VAR_clerk_secret_key: ${{ secrets.CLERK_SECRET_KEY }}
          TF_VAR_supabase_url: ${{ secrets.SUPABASE_URL }}
          TF_VAR_supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TF_VAR_supabase_database_url: ${{ secrets.SUPABASE_DATABASE_URL }}
          TF_VAR_openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          TF_VAR_or_model_simple: ${{ vars.OR_MODEL_SIMPLE }}
          TF_VAR_or_model_fast: ${{ vars.OR_MODEL_FAST }}
          TF_VAR_or_model_reasoning: ${{ vars.OR_MODEL_REASONING }}
          TF_VAR_or_model_embedding: ${{ vars.OR_MODEL_EMBEDDING }}
          TF_VAR_polygon_api_key: ${{ secrets.POLYGON_API_KEY }}
          TF_VAR_langfuse_public_key: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          TF_VAR_langfuse_secret_key: ${{ secrets.LANGFUSE_SECRET_KEY }}
          TF_VAR_langfuse_host: ${{ vars.LANGFUSE_HOST }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_clerk_jwt_issuer: ${{ secrets.CLERK_JWT_ISSUER }}
          TF_VAR_clerk_jwt_audience: ${{ secrets.CLERK_JWT_AUDIENCE }}
        run: terraform plan -out=tfplan1 -input=false

      - name: Terraform apply (phase 1)
        working-directory: terraform
        run: terraform apply -auto-approve -input=false tfplan1

      - name: Verify SQS → Lambda mapping
        working-directory: terraform
        run: |
          set -euo pipefail
          FN="$(terraform output -raw planner_worker_lambda_name)"
          MAP_COUNT="$(aws lambda list-event-source-mappings --function-name "$FN" --query 'length(EventSourceMappings)' --output text)"
          if [ -z "$MAP_COUNT" ] || [ "$MAP_COUNT" = "0" ]; then
            echo "::error::No SQS event source mapping for worker $FN"
            exit 1
          fi

      - name: Resolve CloudFront URL (phase 2 inputs)
        id: public_urls
        working-directory: terraform
        run: |
          CF="$(terraform output -raw cloudfront_url)"
          echo "cloudfront_url=$CF" >> "$GITHUB_OUTPUT"

      - name: Terraform plan (phase 2 — tighten CORS + Lambda public URLs)
        working-directory: terraform
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_api_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_worker_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_node_env: production
          TF_VAR_api_base_url: ${{ steps.public_urls.outputs.cloudfront_url }}
          TF_VAR_frontend_url: ${{ steps.public_urls.outputs.cloudfront_url }}
          TF_VAR_cors_allow_origin_primary: ${{ steps.public_urls.outputs.cloudfront_url }}
          TF_VAR_clerk_secret_key: ${{ secrets.CLERK_SECRET_KEY }}
          TF_VAR_supabase_url: ${{ secrets.SUPABASE_URL }}
          TF_VAR_supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TF_VAR_supabase_database_url: ${{ secrets.SUPABASE_DATABASE_URL }}
          TF_VAR_openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          TF_VAR_or_model_simple: ${{ vars.OR_MODEL_SIMPLE }}
          TF_VAR_or_model_fast: ${{ vars.OR_MODEL_FAST }}
          TF_VAR_or_model_reasoning: ${{ vars.OR_MODEL_REASONING }}
          TF_VAR_or_model_embedding: ${{ vars.OR_MODEL_EMBEDDING }}
          TF_VAR_polygon_api_key: ${{ secrets.POLYGON_API_KEY }}
          TF_VAR_langfuse_public_key: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          TF_VAR_langfuse_secret_key: ${{ secrets.LANGFUSE_SECRET_KEY }}
          TF_VAR_langfuse_host: ${{ vars.LANGFUSE_HOST }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_clerk_jwt_issuer: ${{ secrets.CLERK_JWT_ISSUER }}
          TF_VAR_clerk_jwt_audience: ${{ secrets.CLERK_JWT_AUDIENCE }}
        run: terraform plan -out=tfplan2 -input=false

      - name: Terraform apply (phase 2)
        working-directory: terraform
        run: terraform apply -auto-approve -input=false tfplan2

      - name: Terraform output JSON (infra.json)
        run: terraform -chdir=terraform output -json > "$GITHUB_WORKSPACE/infra.json"

      - name: Assert critical Terraform outputs
        id: infra
        run: |
          set -euo pipefail
          INFRA="$GITHUB_WORKSPACE/infra.json"
          need() {
            local jpath="$1"
            local name="$2"
            local v
            v="$(jq -e -r "${jpath}" "$INFRA")" || { echo "::error::Missing output: $name"; exit 1; }
            if [ -z "$v" ] || [ "$v" = "null" ]; then echo "::error::Empty output: $name"; exit 1; fi
            printf '%s' "$v"
          }
          API_BASE="$(need '.api_base_url.value' api_base_url)"
          CF_URL="$(need '.cloudfront_url.value' cloudfront_url)"
          SQS_URL="$(need '.sqs_queue_url.value' sqs_queue_url)"
          S3_BUCKET="$(need '.s3_bucket.value' s3_bucket)"
          jq -e '.lambda_function_arns.value.api' "$INFRA" >/dev/null || { echo "::error::lambda_function_arns missing api"; exit 1; }
          jq -e '.lambda_function_arns.value.planner_worker' "$INFRA" >/dev/null || { echo "::error::lambda_function_arns missing planner_worker"; exit 1; }
          echo "api_base_url=$API_BASE" >> "$GITHUB_OUTPUT"
          echo "cloudfront_url=$CF_URL" >> "$GITHUB_OUTPUT"
          echo "sqs_queue_url=$SQS_URL" >> "$GITHUB_OUTPUT"
          echo "s3_bucket=$S3_BUCKET" >> "$GITHUB_OUTPUT"
          echo "Lambda ARNs (managed keys):"
          jq -r '.lambda_function_arns.value | to_entries[] | select(.key == "api" or .key == "planner_worker") | "\(.key)=\(.value)"' "$INFRA"

      - name: Build frontend (static export)
        working-directory: frontend
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ${{ steps.infra.outputs.api_base_url }}
          NEXT_PUBLIC_APP_URL: ${{ steps.infra.outputs.cloudfront_url }}
          CLERK_PK_A: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_PK_B: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          export NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="${CLERK_PK_A:-${CLERK_PK_B}}"
          if [ -z "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" ]; then
            echo "::error::Set NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY or CLERK_PUBLISHABLE_KEY secret"
            exit 1
          fi
          npm run build

      - name: Upload UI to S3
        env:
          S3_BUCKET: ${{ steps.infra.outputs.s3_bucket }}
        run: aws s3 sync "$GITHUB_WORKSPACE/frontend/out/" "s3://${S3_BUCKET}/" --delete

      - name: Invalidate CloudFront (with retries)
        working-directory: terraform
        run: |
          set -euo pipefail
          DIST="$(terraform output -raw cloudfront_distribution_id)"
          for i in 1 2 3; do
            if aws cloudfront create-invalidation --distribution-id "$DIST" --paths "/*" --no-cli-pager; then
              exit 0
            fi
            echo "CloudFront invalidation attempt $i failed; retrying in 15s..."
            sleep 15
          done
          echo "::error::CloudFront invalidation failed after 3 attempts"
          exit 1
