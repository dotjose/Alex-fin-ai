# Production deploy: static AWS keys → bootstrap state (S3 + DynamoDB) → main Terraform → ECR image → CORS → infra.json → Next → S3 sync → CloudFront invalidation.
#
# Rules:
# - Static credentials only: AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY (job env). No OIDC, no AWS_ROLE_ARN, no AWS_AUTH_MODE.
# - No secrets.* in step/job "if:" conditions.
# - Remote state bucket is created by terraform/bootstrap (no TF_STATE_* GitHub variables). Bucket name matches Terraform: alex-terraform-state-<account>-<regionSlug>.
# - NEXT_PUBLIC_* for production: only from terraform outputs + NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY secret on the build step.

name: Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Backend tests
        working-directory: backend
        run: uv sync && uv run pytest tests/ -q
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend lint + typecheck
        working-directory: frontend
        run: npm ci && npm run lint && npm run typecheck

  deploy-production:
    name: Deploy (main / manual)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_aws_region: us-east-1
      TF_VAR_node_env: production
      TF_VAR_supabase_url: ${{ vars.SUPABASE_URL }}
      TF_VAR_supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TF_VAR_supabase_database_url: ${{ secrets.SUPABASE_DATABASE_URL }}
      TF_VAR_openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
      TF_VAR_clerk_secret_key: ${{ secrets.CLERK_SECRET_KEY }}
      TF_VAR_clerk_jwt_issuer: ${{ vars.CLERK_JWT_ISSUER }}
    steps:
      - uses: actions/checkout@v4

      - name: Preflight (required secrets, variables, and AWS identity)
        env:
          SUPABASE_URL_VAR: ${{ vars.SUPABASE_URL }}
          CLERK_ISSUER_VAR: ${{ vars.CLERK_JWT_ISSUER }}
        run: |
          set -euo pipefail
          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "::error::Set secrets AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY"
            exit 1
          fi
          if [ -z "${SUPABASE_URL_VAR:-}" ]; then
            echo "::error::Set repository variable SUPABASE_URL (https://<ref>.supabase.co)"
            exit 1
          fi
          if [ -z "${CLERK_ISSUER_VAR:-}" ]; then
            echo "::error::Set repository variable CLERK_JWT_ISSUER (Clerk JWT issuer URL)"
            exit 1
          fi
          if [ -z "${TF_VAR_supabase_service_role_key:-}" ] || [ -z "${TF_VAR_supabase_database_url:-}" ] || [ -z "${TF_VAR_openrouter_api_key:-}" ]; then
            echo "::error::Set secrets SUPABASE_SERVICE_ROLE_KEY, SUPABASE_DATABASE_URL, OPENROUTER_API_KEY"
            exit 1
          fi
          if [ -z "${TF_VAR_clerk_secret_key:-}" ]; then
            echo "::error::Set secret CLERK_SECRET_KEY"
            exit 1
          fi
          aws sts get-caller-identity --no-cli-pager

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Backend tests
        working-directory: backend
        run: uv sync && uv run pytest tests/ -q

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend lint + typecheck
        working-directory: frontend
        run: npm ci && npm run lint && npm run typecheck

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform bootstrap (S3 remote state bucket + DynamoDB lock)
        run: |
          set -euo pipefail
          ACCOUNT="$(aws sts get-caller-identity --query Account --output text)"
          REG_SLUG="${AWS_REGION//-/}"
          STATE_BUCKET="alex-terraform-state-${ACCOUNT}-${REG_SLUG}"
          echo "STATE_BUCKET=$STATE_BUCKET" >> "$GITHUB_ENV"
          META_KEY="_meta/bootstrap/terraform.tfstate"
          BOOT_DIR="${GITHUB_WORKSPACE}/terraform/bootstrap"
          cd "$BOOT_DIR"
          cp "${GITHUB_WORKSPACE}/terraform/.terraform.lock.hcl" ./.terraform.lock.hcl
          if aws s3api head-bucket --bucket "$STATE_BUCKET" 2>/dev/null; then
            aws s3 cp "s3://${STATE_BUCKET}/${META_KEY}" ./terraform.tfstate 2>/dev/null || true
          fi
          ok=false
          for attempt in 1 2 3; do
            if terraform init -backend=false -input=false; then ok=true; break; fi
            echo "bootstrap init failed attempt $attempt"; sleep 10
          done
          if [ "$ok" != true ]; then echo "::error::bootstrap terraform init failed"; exit 1; fi
          ok=false
          for attempt in 1 2 3; do
            if terraform apply -auto-approve -input=false -var="aws_region=${AWS_REGION}"; then ok=true; break; fi
            echo "bootstrap apply failed attempt $attempt"; sleep 20
          done
          if [ "$ok" != true ]; then echo "::error::bootstrap terraform apply failed"; exit 1; fi
          aws s3 cp ./terraform.tfstate "s3://${STATE_BUCKET}/${META_KEY}"

      - name: Write main stack S3 backend config (from bootstrap outputs)
        run: |
          set -euo pipefail
          BUCKET="$(terraform -chdir="${GITHUB_WORKSPACE}/terraform/bootstrap" output -raw state_bucket)"
          TABLE="$(terraform -chdir="${GITHUB_WORKSPACE}/terraform/bootstrap" output -raw lock_table)"
          cat > "${GITHUB_WORKSPACE}/terraform/cideploy.backend.hcl" <<EOF
          bucket         = "${BUCKET}"
          key            = "alex-financial-adviser/main/terraform.tfstate"
          region         = "${AWS_REGION}"
          dynamodb_table = "${TABLE}"
          encrypt        = true
          EOF

      - name: Cache Terraform plugins (main stack)
        uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: ${{ runner.os }}-terraform-main-${{ hashFiles('terraform/.terraform.lock.hcl') }}

      - name: Terraform init (main stack)
        working-directory: terraform
        run: terraform init -input=false -backend-config=cideploy.backend.hcl

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan (phase 1 — placeholder Lambda images + permissive CORS)
        working-directory: terraform
        env:
          TF_VAR_api_base_url: ""
          TF_VAR_frontend_url: ""
          TF_VAR_cors_allow_origin_primary: ""
        run: terraform plan -out=tfplan1 -input=false

      - name: Terraform apply (phase 1, with retries)
        working-directory: terraform
        env:
          TF_VAR_api_base_url: ""
          TF_VAR_frontend_url: ""
          TF_VAR_cors_allow_origin_primary: ""
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if terraform apply -auto-approve -input=false tfplan1; then
              exit 0
            fi
            echo "Terraform apply phase 1 failed (attempt ${attempt}); backing off 30s..."
            sleep 30
          done
          exit 1

      - name: Export ECR coordinates
        id: ecr_meta
        working-directory: terraform
        run: |
          set -euo pipefail
          url="$(terraform output -raw ecr_repository_url)"
          name="$(terraform output -raw ecr_repository_name)"
          registry="${url%%/*}"
          echo "repository_url=$url" >> "$GITHUB_OUTPUT"
          echo "repository_name=$name" >> "$GITHUB_OUTPUT"
          echo "registry=$registry" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        env:
          REGISTRY: ${{ steps.ecr_meta.outputs.registry }}
        run: |
          set -euo pipefail
          aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${REGISTRY}"

      - name: Build and push API image (digest-pinned)
        env:
          REPO_URL: ${{ steps.ecr_meta.outputs.repository_url }}
          REPO_NAME: ${{ steps.ecr_meta.outputs.repository_name }}
          TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_TAG="${REPO_URL}:${TAG}"
          docker build -f apps/api/Dockerfile -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
          DIGEST="$(aws ecr describe-images --repository-name "$REPO_NAME" --region "${AWS_REGION}" \
            --image-ids "imageTag=${TAG}" --query 'imageDetails[0].imageDigest' --output text)"
          if [ -z "$DIGEST" ] || [ "$DIGEST" = "None" ]; then
            echo "::error::Could not resolve ECR image digest"
            exit 1
          fi
          echo "IMAGE_URI=${REPO_URL}@${DIGEST}" >> "$GITHUB_ENV"

      - name: Terraform plan (phase 1b — Lambda images from ECR digest)
        working-directory: terraform
        env:
          TF_VAR_api_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_worker_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_api_base_url: ""
          TF_VAR_frontend_url: ""
          TF_VAR_cors_allow_origin_primary: ""
        run: terraform plan -out=tfplan1b -input=false

      - name: Terraform apply (phase 1b, with retries)
        working-directory: terraform
        env:
          TF_VAR_api_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_worker_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_api_base_url: ""
          TF_VAR_frontend_url: ""
          TF_VAR_cors_allow_origin_primary: ""
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if terraform apply -auto-approve -input=false tfplan1b; then
              exit 0
            fi
            echo "Terraform apply phase 1b failed (attempt ${attempt}); backing off 30s..."
            sleep 30
          done
          exit 1

      - name: Verify SQS → Lambda mapping
        working-directory: terraform
        run: |
          set -euo pipefail
          FN="$(terraform output -raw planner_worker_lambda_name)"
          MAP_COUNT="$(aws lambda list-event-source-mappings --function-name "$FN" --query 'length(EventSourceMappings)' --output text)"
          if [ -z "$MAP_COUNT" ] || [ "$MAP_COUNT" = "0" ]; then
            echo "::error::No SQS event source mapping for worker $FN"
            exit 1
          fi

      - name: Resolve CloudFront URL for phase 2
        id: public_urls
        working-directory: terraform
        run: |
          set -euo pipefail
          CF="$(terraform output -raw cloudfront_url)"
          echo "cloudfront_url=$CF" >> "$GITHUB_OUTPUT"

      - name: Terraform plan (phase 2 — CORS + Lambda public URLs)
        working-directory: terraform
        env:
          TF_VAR_api_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_worker_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_api_base_url: ${{ steps.public_urls.outputs.cloudfront_url }}
          TF_VAR_frontend_url: ${{ steps.public_urls.outputs.cloudfront_url }}
          TF_VAR_cors_allow_origin_primary: ${{ steps.public_urls.outputs.cloudfront_url }}
        run: terraform plan -out=tfplan2 -input=false

      - name: Terraform apply (phase 2, with retries)
        working-directory: terraform
        env:
          TF_VAR_api_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_worker_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_api_base_url: ${{ steps.public_urls.outputs.cloudfront_url }}
          TF_VAR_frontend_url: ${{ steps.public_urls.outputs.cloudfront_url }}
          TF_VAR_cors_allow_origin_primary: ${{ steps.public_urls.outputs.cloudfront_url }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if terraform apply -auto-approve -input=false tfplan2; then
              exit 0
            fi
            echo "Terraform apply phase 2 failed (attempt ${attempt}); backing off 30s..."
            sleep 30
          done
          exit 1

      - name: Terraform output JSON
        run: terraform -chdir=terraform output -json > "$GITHUB_WORKSPACE/infra.json"

      - name: Export deploy env from Terraform outputs
        id: infra
        run: |
          set -euo pipefail
          INFRA="$GITHUB_WORKSPACE/infra.json"
          jq -e '.cloudfront_url.value' "$INFRA" >/dev/null
          cloudfront_url="$(jq -r '.cloudfront_url.value' "$INFRA")"
          api_url="$(jq -r '.api_base_url.value' "$INFRA")"
          sqs_queue_url="$(jq -r '.sqs_queue_url.value' "$INFRA")"
          s3_bucket_name="$(jq -r '.s3_bucket_name.value' "$INFRA")"
          distribution_id="$(jq -r '.cloudfront_distribution_id.value' "$INFRA")"
          if [ -z "$cloudfront_url" ] || [ "$cloudfront_url" = "null" ]; then echo "::error::cloudfront_url missing"; exit 1; fi
          if [ -z "$api_url" ] || [ "$api_url" = "null" ]; then echo "::error::api_base_url missing"; exit 1; fi
          if [ -z "$s3_bucket_name" ] || [ "$s3_bucket_name" = "null" ]; then echo "::error::s3_bucket_name missing"; exit 1; fi
          if [ -z "$distribution_id" ] || [ "$distribution_id" = "null" ]; then echo "::error::cloudfront_distribution_id missing"; exit 1; fi
          {
            echo "cloudfront_url=$cloudfront_url"
            echo "api_url=$api_url"
            echo "sqs_queue_url=$sqs_queue_url"
            echo "s3_bucket_name=$s3_bucket_name"
            echo "distribution_id=$distribution_id"
          } >> "$GITHUB_OUTPUT"

      - name: Build frontend (production)
        working-directory: frontend
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ${{ steps.infra.outputs.api_url }}
          NEXT_PUBLIC_APP_URL: ${{ steps.infra.outputs.cloudfront_url }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}" ]; then
            echo "::error::Set secret NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"
            exit 1
          fi
          npm run build

      - name: Deploy frontend to S3
        env:
          S3_BUCKET_NAME: ${{ steps.infra.outputs.s3_bucket_name }}
        run: aws s3 sync "$GITHUB_WORKSPACE/frontend/out/" "s3://${S3_BUCKET_NAME}/" --delete --region "${AWS_REGION}"

      - name: Invalidate CloudFront
        env:
          DISTRIBUTION_ID: ${{ steps.infra.outputs.distribution_id }}
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            if aws cloudfront create-invalidation --distribution-id "${DISTRIBUTION_ID}" --paths "/*" --no-cli-pager; then
              exit 0
            fi
            echo "CloudFront invalidation attempt $i failed; retrying in 15s..."
            sleep 15
          done
          echo "::error::CloudFront invalidation failed after 3 attempts"
          exit 1
