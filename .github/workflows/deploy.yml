# Production deploy: IAM user keys → bootstrap remote state (S3 + DynamoDB) → main Terraform
# (phased) → ECR image → Lambda image + CORS → Next export → S3 → CloudFront invalidation.
#
# Auth: aws-actions/configure-aws-credentials (static keys only). aws-region from vars.AWS_REGION.
# No OIDC, no AWS_ROLE_ARN, no role-to-assume.
#
# State: terraform/bootstrap creates S3 backend + lock table (no TF_STATE_BUCKET).

name: Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VAR_node_env: production

jobs:
  ci:
    name: CI (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Backend tests
        working-directory: backend
        run: uv sync && uv run pytest tests/ -q
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend lint + typecheck
        working-directory: frontend
        run: npm ci && npm run lint && npm run typecheck

  terraform:
    name: Terraform (bootstrap + phase 1)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_supabase_url: ${{ vars.SUPABASE_URL }}
      TF_VAR_supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TF_VAR_supabase_database_url: ${{ secrets.SUPABASE_DATABASE_URL }}
      TF_VAR_openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
      TF_VAR_clerk_secret_key: ${{ secrets.CLERK_SECRET_KEY }}
      TF_VAR_clerk_jwt_issuer: ${{ vars.CLERK_JWT_ISSUER }}
      TF_VAR_or_model_simple: ${{ vars.OR_MODEL_SIMPLE }}
      TF_VAR_or_model_fast: ${{ vars.OR_MODEL_FAST }}
      TF_VAR_or_model_reasoning: ${{ vars.OR_MODEL_REASONING }}
    outputs:
      state_bucket: ${{ steps.bootstrap.outputs.state_bucket }}
      lock_table: ${{ steps.bootstrap.outputs.lock_table }}
      cloudfront_url: ${{ steps.tf_outputs.outputs.cloudfront_url }}
      api_base_url: ${{ steps.tf_outputs.outputs.api_base_url }}
      sqs_queue_url: ${{ steps.tf_outputs.outputs.sqs_queue_url }}
      s3_bucket_name: ${{ steps.tf_outputs.outputs.s3_bucket_name }}
      distribution_id: ${{ steps.tf_outputs.outputs.distribution_id }}
      ecr_repository_url: ${{ steps.tf_outputs.outputs.ecr_repository_url }}
      ecr_repository_name: ${{ steps.tf_outputs.outputs.ecr_repository_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Preflight
        env:
          AWS_REGION_EXPECT: ${{ vars.AWS_REGION }}
          SUPABASE_URL_VAR: ${{ vars.SUPABASE_URL }}
          CLERK_ISSUER_VAR: ${{ vars.CLERK_JWT_ISSUER }}
        run: |
          set -euo pipefail
          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "::error::Configure secrets AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY (e.g. on the production environment)"
            exit 1
          fi
          if [ -z "${AWS_REGION_EXPECT:-}" ]; then
            echo "::error::Set repository variable AWS_REGION (e.g. us-east-1)"
            exit 1
          fi
          if [ -z "${SUPABASE_URL_VAR:-}" ]; then
            echo "::error::Set repository variable SUPABASE_URL"
            exit 1
          fi
          if [ -z "${CLERK_ISSUER_VAR:-}" ]; then
            echo "::error::Set repository variable CLERK_JWT_ISSUER"
            exit 1
          fi
          if [ -z "${TF_VAR_supabase_service_role_key:-}" ] || [ -z "${TF_VAR_supabase_database_url:-}" ] || [ -z "${TF_VAR_openrouter_api_key:-}" ]; then
            echo "::error::Set secrets SUPABASE_SERVICE_ROLE_KEY, SUPABASE_DATABASE_URL, OPENROUTER_API_KEY"
            exit 1
          fi
          if [ -z "${TF_VAR_clerk_secret_key:-}" ]; then
            echo "::error::Set secret CLERK_SECRET_KEY"
            exit 1
          fi
          aws sts get-caller-identity --no-cli-pager

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Backend tests
        working-directory: backend
        run: uv sync && uv run pytest tests/ -q

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend lint + typecheck
        working-directory: frontend
        run: npm ci && npm run lint && npm run typecheck

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform bootstrap (S3 remote state + DynamoDB lock)
        id: bootstrap
        run: |
          set -euo pipefail
          ACCOUNT="$(aws sts get-caller-identity --query Account --output text)"
          REG_SLUG="${AWS_REGION//-/}"
          STATE_BUCKET="alex-terraform-state-${ACCOUNT}-${REG_SLUG}"
          echo "STATE_BUCKET=$STATE_BUCKET" >> "$GITHUB_ENV"
          META_KEY="_meta/bootstrap/terraform.tfstate"
          BOOT_DIR="${GITHUB_WORKSPACE}/terraform/bootstrap"
          cd "$BOOT_DIR"
          cp "${GITHUB_WORKSPACE}/terraform/.terraform.lock.hcl" ./.terraform.lock.hcl
          if aws s3api head-bucket --bucket "$STATE_BUCKET" 2>/dev/null; then
            aws s3 cp "s3://${STATE_BUCKET}/${META_KEY}" ./terraform.tfstate 2>/dev/null || true
          fi
          ok=false
          for attempt in 1 2 3; do
            if terraform init -backend=false -input=false; then ok=true; break; fi
            echo "bootstrap init failed attempt $attempt"; sleep 10
          done
          if [ "$ok" != true ]; then echo "::error::bootstrap terraform init failed"; exit 1; fi
          ok=false
          for attempt in 1 2 3; do
            if terraform apply -auto-approve -input=false -var="aws_region=${AWS_REGION}"; then ok=true; break; fi
            echo "bootstrap apply failed attempt $attempt"; sleep 20
          done
          if [ "$ok" != true ]; then echo "::error::bootstrap terraform apply failed"; exit 1; fi
          aws s3 cp ./terraform.tfstate "s3://${STATE_BUCKET}/${META_KEY}"
          echo "state_bucket=$(terraform output -raw state_bucket)" >> "$GITHUB_OUTPUT"
          echo "lock_table=$(terraform output -raw lock_table)" >> "$GITHUB_OUTPUT"

      - name: Write main stack S3 backend config
        run: |
          set -euo pipefail
          BUCKET="$(terraform -chdir="${GITHUB_WORKSPACE}/terraform/bootstrap" output -raw state_bucket)"
          TABLE="$(terraform -chdir="${GITHUB_WORKSPACE}/terraform/bootstrap" output -raw lock_table)"
          cat > "${GITHUB_WORKSPACE}/terraform/cideploy.backend.hcl" <<EOF
          bucket         = "${BUCKET}"
          key            = "alex-financial-adviser/main/terraform.tfstate"
          region         = "${AWS_REGION}"
          dynamodb_table = "${TABLE}"
          encrypt        = true
          EOF

      - uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: ${{ runner.os }}-terraform-main-${{ hashFiles('terraform/.terraform.lock.hcl') }}

      - name: Terraform init (main)
        working-directory: terraform
        run: terraform init -input=false -backend-config=cideploy.backend.hcl

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan (phase 1 — placeholder Lambda images + permissive CORS)
        working-directory: terraform
        env:
          TF_VAR_api_base_url: ""
          TF_VAR_frontend_url: ""
          TF_VAR_cors_allow_origin_primary: ""
        run: terraform plan -out=tfplan1 -input=false

      - name: Terraform apply (phase 1, with retries)
        working-directory: terraform
        env:
          TF_VAR_api_base_url: ""
          TF_VAR_frontend_url: ""
          TF_VAR_cors_allow_origin_primary: ""
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if terraform apply -auto-approve -input=false tfplan1; then
              exit 0
            fi
            echo "Terraform apply phase 1 failed (attempt ${attempt}); backing off 30s..."
            sleep 30
          done
          exit 1

      - name: Terraform output (JSON) + job outputs
        id: tf_outputs
        working-directory: terraform
        run: |
          set -euo pipefail
          terraform output -json > "$GITHUB_WORKSPACE/infra.json"
          INFRA="$GITHUB_WORKSPACE/infra.json"
          jq -e '.cloudfront_url.value' "$INFRA" >/dev/null
          jq -e '.api_base_url.value' "$INFRA" >/dev/null
          jq -e '.sqs_queue_url.value' "$INFRA" >/dev/null
          echo "cloudfront_url=$(jq -r '.cloudfront_url.value' "$INFRA")" >> "$GITHUB_OUTPUT"
          echo "api_base_url=$(jq -r '.api_base_url.value' "$INFRA")" >> "$GITHUB_OUTPUT"
          echo "sqs_queue_url=$(jq -r '.sqs_queue_url.value' "$INFRA")" >> "$GITHUB_OUTPUT"
          echo "s3_bucket_name=$(jq -r '.s3_bucket_name.value' "$INFRA")" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(jq -r '.cloudfront_distribution_id.value' "$INFRA")" >> "$GITHUB_OUTPUT"
          echo "ecr_repository_url=$(jq -r '.ecr_repository_url.value' "$INFRA")" >> "$GITHUB_OUTPUT"
          echo "ecr_repository_name=$(jq -r '.ecr_repository_name.value' "$INFRA")" >> "$GITHUB_OUTPUT"

  lambda_deploy:
    name: Lambda (ECR + Terraform phases 1b + 2)
    needs: [terraform]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_supabase_url: ${{ vars.SUPABASE_URL }}
      TF_VAR_supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TF_VAR_supabase_database_url: ${{ secrets.SUPABASE_DATABASE_URL }}
      TF_VAR_openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
      TF_VAR_clerk_secret_key: ${{ secrets.CLERK_SECRET_KEY }}
      TF_VAR_clerk_jwt_issuer: ${{ vars.CLERK_JWT_ISSUER }}
      TF_VAR_or_model_simple: ${{ vars.OR_MODEL_SIMPLE }}
      TF_VAR_or_model_fast: ${{ vars.OR_MODEL_FAST }}
      TF_VAR_or_model_reasoning: ${{ vars.OR_MODEL_REASONING }}
    outputs:
      cloudfront_url: ${{ steps.final_outputs.outputs.cloudfront_url }}
      api_base_url: ${{ steps.final_outputs.outputs.api_base_url }}
      sqs_queue_url: ${{ steps.final_outputs.outputs.sqs_queue_url }}
      s3_bucket_name: ${{ steps.final_outputs.outputs.s3_bucket_name }}
      distribution_id: ${{ steps.final_outputs.outputs.distribution_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Restore S3 backend config
        run: |
          set -euo pipefail
          cat > "${GITHUB_WORKSPACE}/terraform/cideploy.backend.hcl" <<EOF
          bucket         = "${{ needs.terraform.outputs.state_bucket }}"
          key            = "alex-financial-adviser/main/terraform.tfstate"
          region         = "${{ vars.AWS_REGION }}"
          dynamodb_table = "${{ needs.terraform.outputs.lock_table }}"
          encrypt        = true
          EOF

      - uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: ${{ runner.os }}-terraform-main-${{ hashFiles('terraform/.terraform.lock.hcl') }}

      - name: Terraform init (main)
        working-directory: terraform
        run: terraform init -input=false -backend-config=cideploy.backend.hcl

      - name: Login to Amazon ECR
        env:
          REPO_URL: ${{ needs.terraform.outputs.ecr_repository_url }}
        run: |
          set -euo pipefail
          REGISTRY="${REPO_URL%%/*}"
          aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${REGISTRY}"

      - name: Build and push API image (digest-pinned)
        env:
          REPO_URL: ${{ needs.terraform.outputs.ecr_repository_url }}
          REPO_NAME: ${{ needs.terraform.outputs.ecr_repository_name }}
          TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_TAG="${REPO_URL}:${TAG}"
          docker build -f apps/api/Dockerfile -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
          DIGEST="$(aws ecr describe-images --repository-name "$REPO_NAME" --region "${AWS_REGION}" \
            --image-ids "imageTag=${TAG}" --query 'imageDetails[0].imageDigest' --output text)"
          if [ -z "$DIGEST" ] || [ "$DIGEST" = "None" ]; then
            echo "::error::Could not resolve ECR image digest"
            exit 1
          fi
          echo "IMAGE_URI=${REPO_URL}@${DIGEST}" >> "$GITHUB_ENV"

      - name: Terraform plan (phase 1b — Lambda images from ECR digest)
        working-directory: terraform
        env:
          TF_VAR_api_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_worker_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_api_base_url: ""
          TF_VAR_frontend_url: ""
          TF_VAR_cors_allow_origin_primary: ""
        run: terraform plan -out=tfplan1b -input=false

      - name: Terraform apply (phase 1b, with retries)
        working-directory: terraform
        env:
          TF_VAR_api_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_worker_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_api_base_url: ""
          TF_VAR_frontend_url: ""
          TF_VAR_cors_allow_origin_primary: ""
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if terraform apply -auto-approve -input=false tfplan1b; then
              exit 0
            fi
            echo "Terraform apply phase 1b failed (attempt ${attempt}); backing off 30s..."
            sleep 30
          done
          exit 1

      - name: Verify SQS → Lambda mapping
        working-directory: terraform
        run: |
          set -euo pipefail
          FN="$(terraform output -raw planner_worker_lambda_name)"
          MAP_COUNT="$(aws lambda list-event-source-mappings --function-name "$FN" --query 'length(EventSourceMappings)' --output text)"
          if [ -z "$MAP_COUNT" ] || [ "$MAP_COUNT" = "0" ]; then
            echo "::error::No SQS event source mapping for worker $FN"
            exit 1
          fi

      - name: Terraform plan (phase 2 — CORS + Lambda public URLs)
        working-directory: terraform
        env:
          TF_VAR_api_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_worker_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_api_base_url: ${{ needs.terraform.outputs.cloudfront_url }}
          TF_VAR_frontend_url: ${{ needs.terraform.outputs.cloudfront_url }}
          TF_VAR_cors_allow_origin_primary: ${{ needs.terraform.outputs.cloudfront_url }}
        run: terraform plan -out=tfplan2 -input=false

      - name: Terraform apply (phase 2, with retries)
        working-directory: terraform
        env:
          TF_VAR_api_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_worker_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_api_base_url: ${{ needs.terraform.outputs.cloudfront_url }}
          TF_VAR_frontend_url: ${{ needs.terraform.outputs.cloudfront_url }}
          TF_VAR_cors_allow_origin_primary: ${{ needs.terraform.outputs.cloudfront_url }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if terraform apply -auto-approve -input=false tfplan2; then
              exit 0
            fi
            echo "Terraform apply phase 2 failed (attempt ${attempt}); backing off 30s..."
            sleep 30
          done
          exit 1

      - name: Terraform output (JSON) + export deploy env + job outputs
        id: final_outputs
        working-directory: terraform
        run: |
          set -euo pipefail
          terraform output -json > "$GITHUB_WORKSPACE/infra.json"
          INFRA="$GITHUB_WORKSPACE/infra.json"
          jq -e '.cloudfront_url.value' "$INFRA" >/dev/null
          CF="$(jq -r '.cloudfront_url.value' "$INFRA")"
          API="$(jq -r '.api_base_url.value' "$INFRA")"
          SQS="$(jq -r '.sqs_queue_url.value' "$INFRA")"
          S3="$(jq -r '.s3_bucket_name.value' "$INFRA")"
          DIST="$(jq -r '.cloudfront_distribution_id.value' "$INFRA")"
          {
            echo "NEXT_PUBLIC_API_URL=${CF}"
            echo "FRONTEND_URL=${CF}"
            echo "API_BASE_URL=${API}"
            echo "SQS_QUEUE_URL=${SQS}"
          } >> "$GITHUB_ENV"
          {
            echo "cloudfront_url=${CF}"
            echo "api_base_url=${API}"
            echo "sqs_queue_url=${SQS}"
            echo "s3_bucket_name=${S3}"
            echo "distribution_id=${DIST}"
          } >> "$GITHUB_OUTPUT"

  build_frontend:
    name: Build frontend
    needs: [lambda_deploy]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_API_URL: ${{ needs.lambda_deploy.outputs.cloudfront_url }}
      FRONTEND_URL: ${{ needs.lambda_deploy.outputs.cloudfront_url }}
      API_BASE_URL: ${{ needs.lambda_deploy.outputs.api_base_url }}
      SQS_QUEUE_URL: ${{ needs.lambda_deploy.outputs.sqs_queue_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Write .env.production and build
        working-directory: frontend
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}" ]; then
            echo "::error::Set secret NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"
            exit 1
          fi
          {
            echo "NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}"
            echo "NEXT_PUBLIC_APP_URL=${FRONTEND_URL}"
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}"
          } > .env.production
          npm ci
          npm run build

      - name: Deploy static export to S3
        env:
          S3_BUCKET_NAME: ${{ needs.lambda_deploy.outputs.s3_bucket_name }}
        run: aws s3 sync "${GITHUB_WORKSPACE}/frontend/out/" "s3://${S3_BUCKET_NAME}/" --delete --region "${AWS_REGION}"

  invalidate_cloudfront:
    name: Invalidate CloudFront
    needs: [build_frontend, lambda_deploy]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Create CloudFront invalidation
        env:
          DISTRIBUTION_ID: ${{ needs.lambda_deploy.outputs.distribution_id }}
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            if aws cloudfront create-invalidation --distribution-id "${DISTRIBUTION_ID}" --paths "/*" --no-cli-pager; then
              exit 0
            fi
            echo "CloudFront invalidation attempt $i failed; retrying in 15s..."
            sleep 15
          done
          echo "::error::CloudFront invalidation failed after 3 attempts"
          exit 1
