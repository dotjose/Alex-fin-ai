name: Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Backend tests
        working-directory: backend
        run: uv sync && uv run pytest tests/ -q
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend lint + typecheck
        working-directory: frontend
        run: npm ci && npm run lint && npm run typecheck

  deploy:
    name: Production
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_node_env: ${{ vars.NODE_ENV }}
      TF_VAR_supabase_url: ${{ secrets.TF_SUPABASE_URL }}
      TF_VAR_supabase_service_role_key: ${{ secrets.TF_VAR_SUPABASE_SERVICE_ROLE_KEY }}
      TF_VAR_supabase_database_url: ${{ secrets.TF_VAR_SUPABASE_DATABASE_URL }}
      TF_VAR_openrouter_api_key: ${{ secrets.TF_VAR_OPENROUTER_API_KEY }}
      TF_VAR_clerk_secret_key: ${{ secrets.TF_VAR_CLERK_SECRET_KEY }}
      TF_VAR_clerk_jwt_issuer: ${{ vars.CLERK_JWT_ISSUER }}
      TF_VAR_or_model_simple: ${{ vars.OR_MODEL_SIMPLE }}
      TF_VAR_or_model_fast: ${{ vars.OR_MODEL_FAST }}
      TF_VAR_or_model_reasoning: ${{ vars.OR_MODEL_REASONING }}
      TF_VAR_langfuse_public_key: ${{ secrets.TF_VAR_LANGFUSE_PUBLIC_KEY }}
      TF_VAR_langfuse_secret_key: ${{ secrets.TF_VAR_LANGFUSE_SECRET_KEY }}
      TF_VAR_langfuse_host: ${{ vars.LANGFUSE_HOST }}
      TF_VAR_openai_api_key: ${{ secrets.TF_VAR_OPENAI_API_KEY }}
      TF_VAR_polygon_api_key: ${{ secrets.TF_VAR_POLYGON_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Optional Terraform ECR mode (create | import)
        if: ${{ vars.ECR_REPOSITORY_CREATION_MODE != '' }}
        run: |
          echo "TF_VAR_ecr_repository_creation_mode=${{ vars.ECR_REPOSITORY_CREATION_MODE }}" >> "$GITHUB_ENV"

      - name: Preflight
        env:
          AWS_REGION_EXPECT: ${{ vars.AWS_REGION }}
          CLERK_ISSUER_EXPECT: ${{ vars.CLERK_JWT_ISSUER }}
        run: |
          set -euo pipefail
          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "::error::Secrets AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY (production environment)"
            exit 1
          fi
          if [ -z "${AWS_REGION_EXPECT:-}" ]; then
            echo "::error::Variable AWS_REGION"
            exit 1
          fi
          if [ -z "${TF_VAR_supabase_url:-}" ]; then
            echo "::error::Secret TF_SUPABASE_URL"
            exit 1
          fi
          if [ -z "${CLERK_ISSUER_EXPECT:-}" ]; then
            echo "::error::Variable CLERK_JWT_ISSUER"
            exit 1
          fi
          if [ -z "${TF_VAR_supabase_service_role_key:-}" ] || [ -z "${TF_VAR_supabase_database_url:-}" ] || [ -z "${TF_VAR_openrouter_api_key:-}" ]; then
            echo "::error::Secrets TF_VAR_SUPABASE_SERVICE_ROLE_KEY, TF_VAR_SUPABASE_DATABASE_URL, TF_VAR_OPENROUTER_API_KEY"
            exit 1
          fi
          if [ -z "${TF_VAR_clerk_secret_key:-}" ]; then
            echo "::error::Secret TF_VAR_CLERK_SECRET_KEY"
            exit 1
          fi
          aws sts get-caller-identity --no-cli-pager

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Backend tests
        working-directory: backend
        run: uv sync && uv run pytest tests/ -q

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend lint + typecheck
        working-directory: frontend
        run: npm ci && npm run lint && npm run typecheck

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
          terraform_version: "~1.10.0"

      - name: Terraform bootstrap (S3 remote state + native state locking)
        id: bootstrap
        run: |
          set -euo pipefail
          ACCOUNT="$(aws sts get-caller-identity --query Account --output text)"
          REG_SLUG="${AWS_REGION//-/}"
          STATE_BUCKET="alex-terraform-state-${ACCOUNT}-${REG_SLUG}"
          echo "STATE_BUCKET=$STATE_BUCKET" >> "$GITHUB_ENV"
          META_KEY="_meta/bootstrap/terraform.tfstate"
          BOOT_DIR="${GITHUB_WORKSPACE}/terraform/bootstrap"
          cd "$BOOT_DIR"
          cp "${GITHUB_WORKSPACE}/terraform/.terraform.lock.hcl" ./.terraform.lock.hcl
          ok=false
          for attempt in 1 2 3; do
            if terraform init -backend=false -input=false; then ok=true; break; fi
            echo "bootstrap init failed attempt $attempt"; sleep 10
          done
          if [ "$ok" != true ]; then echo "::error::bootstrap terraform init failed"; exit 1; fi
          ok=false
          for attempt in 1 2 3; do
            if terraform apply -auto-approve -input=false -var="aws_region=${AWS_REGION}"; then ok=true; break; fi
            echo "bootstrap apply failed attempt $attempt"; sleep 20
          done
          if [ "$ok" != true ]; then echo "::error::bootstrap terraform apply failed"; exit 1; fi
          aws s3 cp ./terraform.tfstate "s3://${STATE_BUCKET}/${META_KEY}"
          echo "state_bucket=$(terraform output -raw state_bucket)" >> "$GITHUB_OUTPUT"

      - name: Write main stack S3 backend config
        run: |
          set -euo pipefail
          BUCKET="$(terraform -chdir="${GITHUB_WORKSPACE}/terraform/bootstrap" output -raw state_bucket)"
          cat > "${GITHUB_WORKSPACE}/terraform/cideploy.backend.hcl" <<EOF
          bucket         = "${BUCKET}"
          key            = "alex-financial-adviser/main/terraform.tfstate"
          region         = "${AWS_REGION}"
          use_lockfile   = true
          encrypt        = true
          EOF

      - uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: ${{ runner.os }}-terraform-main-${{ hashFiles('terraform/.terraform.lock.hcl') }}

      - name: Terraform init (main)
        working-directory: terraform
        run: terraform init -input=false -lock-timeout=300s -backend-config=cideploy.backend.hcl

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Detect Lambda in Terraform state
        id: tfstate
        working-directory: terraform
        run: |
          set -euo pipefail
          if terraform state list -no-color 2>/dev/null | grep -qE '^module\.lambda(\[0\])?\.module\.compute\.'; then
            echo "has_lambda=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_lambda=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform plan and apply (foundation — no Lambda compute, no -target)
        if: steps.tfstate.outputs.has_lambda == 'false'
        working-directory: terraform
        env:
          TF_VAR_enable_lambda_compute: "false"
        run: |
          set -euo pipefail
          export TF_VAR_api_image_uri=""
          export TF_VAR_worker_image_uri=""
          export TF_VAR_api_base_url=""
          export TF_VAR_frontend_url=""
          export TF_VAR_cors_allow_origin_primary=""
          terraform plan -out=plan_foundation.tfplan -input=false -lock-timeout=300s
          bash "${GITHUB_WORKSPACE}/scripts/ci/terraform_apply_network_retry.sh" plan_foundation.tfplan

      - name: Login to Amazon ECR
        working-directory: terraform
        run: |
          set -euo pipefail
          REPO_URL="$(terraform output -raw ecr_repository_url)"
          REGISTRY="${REPO_URL%%/*}"
          aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${REGISTRY}"

      - name: Build and push API + worker images (linux/amd64, digest-pinned)
        working-directory: terraform
        env:
          TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          REPO_URL="$(terraform output -raw ecr_repository_url)"
          REPO_NAME="$(terraform output -raw ecr_repository_name)"
          TAG_API="${TAG}-api"
          TAG_WORKER="${TAG}-worker"
          docker build --platform linux/amd64 -f "${GITHUB_WORKSPACE}/apps/api/Dockerfile" -t "${REPO_URL}:${TAG_API}" "${GITHUB_WORKSPACE}"
          docker build --platform linux/amd64 -f "${GITHUB_WORKSPACE}/apps/api/Dockerfile.worker" -t "${REPO_URL}:${TAG_WORKER}" "${GITHUB_WORKSPACE}"
          docker push "${REPO_URL}:${TAG_API}"
          docker push "${REPO_URL}:${TAG_WORKER}"
          DIGEST_API="$(aws ecr describe-images --repository-name "$REPO_NAME" --region "${AWS_REGION}" \
            --image-ids "imageTag=${TAG_API}" --query 'imageDetails[0].imageDigest' --output text)"
          DIGEST_WORKER="$(aws ecr describe-images --repository-name "$REPO_NAME" --region "${AWS_REGION}" \
            --image-ids "imageTag=${TAG_WORKER}" --query 'imageDetails[0].imageDigest' --output text)"
          if [ -z "$DIGEST_API" ] || [ "$DIGEST_API" = "None" ] || [ -z "$DIGEST_WORKER" ] || [ "$DIGEST_WORKER" = "None" ]; then
            echo "::error::Could not resolve ECR image digests"
            exit 1
          fi
          echo "IMAGE_URI_API=${REPO_URL}@${DIGEST_API}" >> "$GITHUB_ENV"
          echo "IMAGE_URI_WORKER=${REPO_URL}@${DIGEST_WORKER}" >> "$GITHUB_ENV"

      - name: Terraform plan and apply (compute + CORS — private ECR only, no -target)
        working-directory: terraform
        env:
          TF_VAR_enable_lambda_compute: "true"
        run: |
          set -euo pipefail
          : "${IMAGE_URI_API:?missing IMAGE_URI_API}"
          : "${IMAGE_URI_WORKER:?missing IMAGE_URI_WORKER}"
          export TF_VAR_api_image_uri="$IMAGE_URI_API"
          export TF_VAR_worker_image_uri="$IMAGE_URI_WORKER"
          CF="$(terraform output -raw cloudfront_url)"
          export TF_VAR_api_base_url="$CF"
          export TF_VAR_frontend_url="$CF"
          export TF_VAR_cors_allow_origin_primary="$CF"
          terraform plan -out=plan_compute.tfplan -input=false -lock-timeout=300s
          bash "${GITHUB_WORKSPACE}/scripts/ci/terraform_apply_network_retry.sh" plan_compute.tfplan

      - name: Verify SQS → Lambda mapping
        working-directory: terraform
        run: |
          set -euo pipefail
          FN="$(terraform output -raw planner_worker_lambda_name)"
          if [ -z "$FN" ]; then
            echo "::error::planner_worker_lambda_name empty"
            exit 1
          fi
          MAP_COUNT="$(aws lambda list-event-source-mappings --function-name "$FN" --query 'length(EventSourceMappings)' --output text)"
          if [ -z "$MAP_COUNT" ] || [ "$MAP_COUNT" = "0" ]; then
            echo "::error::No SQS event source mapping for worker $FN"
            exit 1
          fi

      - name: Export deploy env for Next + S3
        working-directory: terraform
        run: |
          set -euo pipefail
          echo "NEXT_PUBLIC_API_URL=$(terraform output -raw cloudfront_url)" >> "$GITHUB_ENV"
          echo "FRONTEND_URL=$(terraform output -raw cloudfront_url)" >> "$GITHUB_ENV"
          echo "API_BASE_URL=$(terraform output -raw api_base_url)" >> "$GITHUB_ENV"
          echo "SQS_QUEUE_URL=$(terraform output -raw sqs_queue_url)" >> "$GITHUB_ENV"
          echo "S3_BUCKET_NAME=$(terraform output -raw s3_bucket_name)" >> "$GITHUB_ENV"
          echo "DISTRIBUTION_ID=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_ENV"

      - name: Build Next.js static export
        working-directory: frontend
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}" ]; then
            echo "::error::Secret NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"
            exit 1
          fi
          {
            echo "NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}"
            echo "NEXT_PUBLIC_APP_URL=${FRONTEND_URL}"
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}"
          } > .env.production
          npm ci
          npm run build

      - name: Upload static export to S3
        run: |
          set -euo pipefail
          aws s3 sync "${GITHUB_WORKSPACE}/frontend/out/" "s3://${S3_BUCKET_NAME}/" --delete --region "${AWS_REGION}"

      - name: Invalidate CloudFront
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            if aws cloudfront create-invalidation --distribution-id "${DISTRIBUTION_ID}" --paths "/*" --no-cli-pager; then
              exit 0
            fi
            sleep $((i * 15))
          done
          exit 1
