# Production deploy: self-bootstrap Terraform state → main stack → ECR image → CORS tighten → infra.json → Next → S3 → CloudFront.
#
# Rules:
# - No secrets.* in job/step "if:" (use steps.aws_auth.outputs.mode only).
# - Remote state bucket + lock table are created by Terraform bootstrap (no TF_STATE_* GitHub variables).
# - Public URLs: only terraform output -json (infra.json). Clerk publishable key: single secret NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY.

name: Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Backend tests
        working-directory: backend
        run: uv sync && uv run pytest tests/ -q
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend lint + typecheck
        working-directory: frontend
        run: npm ci && npm run lint && npm run typecheck

  deploy-production:
    name: Deploy (main / manual)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      TF_VAR_node_env: production
      TF_VAR_clerk_secret_key: ${{ secrets.CLERK_SECRET_KEY }}
      TF_VAR_supabase_url: ${{ secrets.SUPABASE_URL }}
      TF_VAR_supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TF_VAR_supabase_database_url: ${{ secrets.SUPABASE_DATABASE_URL }}
      TF_VAR_openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
      TF_VAR_polygon_api_key: ${{ secrets.POLYGON_API_KEY }}
      TF_VAR_langfuse_public_key: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      TF_VAR_langfuse_secret_key: ${{ secrets.LANGFUSE_SECRET_KEY }}
      TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
      TF_VAR_clerk_jwt_issuer: ${{ secrets.CLERK_JWT_ISSUER }}
      TF_VAR_clerk_jwt_audience: ${{ secrets.CLERK_JWT_AUDIENCE }}
    steps:
      - uses: actions/checkout@v4

      - name: Preflight (AWS region for bootstrap + providers)
        env:
          R: ${{ vars.AWS_REGION }}
        run: |
          set -euo pipefail
          if [ -n "${R:-}" ]; then
            echo "AWS_REGION=$R" >> "$GITHUB_ENV"
            echo "TF_VAR_aws_region=$R" >> "$GITHUB_ENV"
          else
            echo "AWS_REGION=us-east-1" >> "$GITHUB_ENV"
            echo "TF_VAR_aws_region=us-east-1" >> "$GITHUB_ENV"
          fi

      - name: Resolve AWS auth mode (outputs only — safe for if:)
        id: aws_auth
        env:
          RAW_MODE: ${{ vars.AWS_AUTH_MODE }}
        run: |
          set -euo pipefail
          m="${RAW_MODE:-oidc}"
          case "$m" in
            oidc|keys) echo "mode=${m}" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "::error::Invalid AWS_AUTH_MODE '${m}'. Use oidc or keys."
              exit 1
              ;;
          esac

      - name: Validate credentials for selected AWS auth mode
        env:
          MODE: ${{ steps.aws_auth.outputs.mode }}
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          if [ "$MODE" = "oidc" ]; then
            if [ -z "${AWS_ROLE_ARN:-}" ]; then
              echo "::error::AWS_AUTH_MODE=oidc requires secret AWS_ROLE_ARN"
              exit 1
            fi
          else
            if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
              echo "::error::AWS_AUTH_MODE=keys requires secrets AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY"
              exit 1
            fi
          fi

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Backend tests
        working-directory: backend
        run: uv sync && uv run pytest tests/ -q

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend lint + typecheck
        working-directory: frontend
        run: npm ci && npm run lint && npm run typecheck

      - name: Configure AWS credentials (OIDC)
        if: steps.aws_auth.outputs.mode == 'oidc'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (static keys)
        if: steps.aws_auth.outputs.mode == 'keys'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform bootstrap (S3 state bucket + DynamoDB lock; state self-persisted in S3)
        run: |
          set -euo pipefail
          ACCOUNT="$(aws sts get-caller-identity --query Account --output text)"
          REG_SLUG="${AWS_REGION//-/}"
          STATE_BUCKET="alexfin-tfstate-${ACCOUNT}-${REG_SLUG}"
          echo "STATE_BUCKET=$STATE_BUCKET" >> "$GITHUB_ENV"
          META_KEY="_meta/bootstrap/terraform.tfstate"
          BOOT_DIR="${GITHUB_WORKSPACE}/terraform/bootstrap"
          cd "$BOOT_DIR"
          cp "${GITHUB_WORKSPACE}/terraform/.terraform.lock.hcl" ./.terraform.lock.hcl
          if aws s3api head-bucket --bucket "$STATE_BUCKET" 2>/dev/null; then
            aws s3 cp "s3://${STATE_BUCKET}/${META_KEY}" ./terraform.tfstate 2>/dev/null || true
          fi
          ok=false
          for attempt in 1 2 3; do
            if terraform init -backend=false -input=false; then ok=true; break; fi
            echo "bootstrap init failed attempt $attempt"; sleep 10
          done
          if [ "$ok" != true ]; then echo "::error::bootstrap terraform init failed"; exit 1; fi
          ok=false
          for attempt in 1 2 3; do
            if terraform apply -auto-approve -input=false -var="aws_region=${AWS_REGION}"; then ok=true; break; fi
            echo "bootstrap apply failed attempt $attempt"; sleep 20
          done
          if [ "$ok" != true ]; then echo "::error::bootstrap terraform apply failed"; exit 1; fi
          aws s3 cp ./terraform.tfstate "s3://${STATE_BUCKET}/${META_KEY}"

      - name: Write main stack S3 backend config (from bootstrap outputs)
        run: |
          set -euo pipefail
          BUCKET="$(terraform -chdir="${GITHUB_WORKSPACE}/terraform/bootstrap" output -raw state_bucket)"
          TABLE="$(terraform -chdir="${GITHUB_WORKSPACE}/terraform/bootstrap" output -raw lock_table)"
          cat > "${GITHUB_WORKSPACE}/terraform/cideploy.backend.hcl" <<EOF
          bucket         = "${BUCKET}"
          key            = "alex-financial-adviser/main/terraform.tfstate"
          region         = "${AWS_REGION}"
          dynamodb_table = "${TABLE}"
          encrypt        = true
          EOF

      - name: Cache Terraform plugins (main stack)
        uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: ${{ runner.os }}-terraform-main-${{ hashFiles('terraform/.terraform.lock.hcl') }}

      - name: Terraform init (main stack, remote state)
        working-directory: terraform
        run: terraform init -input=false -backend-config=cideploy.backend.hcl

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan (phase 1 — placeholder Lambda images + permissive CORS)
        working-directory: terraform
        env:
          TF_VAR_api_base_url: ""
          TF_VAR_frontend_url: ""
          TF_VAR_cors_allow_origin_primary: ""
        run: terraform plan -out=tfplan1 -input=false

      - name: Terraform apply (phase 1, with retries)
        working-directory: terraform
        env:
          TF_VAR_api_base_url: ""
          TF_VAR_frontend_url: ""
          TF_VAR_cors_allow_origin_primary: ""
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if terraform apply -auto-approve -input=false tfplan1; then
              exit 0
            fi
            echo "Terraform apply phase 1 failed (attempt ${attempt}); backing off 30s..."
            sleep 30
          done
          exit 1

      - name: Export ECR coordinates
        id: ecr_meta
        working-directory: terraform
        run: |
          set -euo pipefail
          url="$(terraform output -raw ecr_repository_url)"
          name="$(terraform output -raw ecr_repository_name)"
          registry="${url%%/*}"
          echo "repository_url=$url" >> "$GITHUB_OUTPUT"
          echo "repository_name=$name" >> "$GITHUB_OUTPUT"
          echo "registry=$registry" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        env:
          REGISTRY: ${{ steps.ecr_meta.outputs.registry }}
        run: |
          set -euo pipefail
          aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${REGISTRY}"

      - name: Build and push API image (digest-pinned)
        env:
          REPO_URL: ${{ steps.ecr_meta.outputs.repository_url }}
          REPO_NAME: ${{ steps.ecr_meta.outputs.repository_name }}
          TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_TAG="${REPO_URL}:${TAG}"
          docker build -f apps/api/Dockerfile -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
          DIGEST="$(aws ecr describe-images --repository-name "$REPO_NAME" --region "${AWS_REGION}" \
            --image-ids "imageTag=${TAG}" --query 'imageDetails[0].imageDigest' --output text)"
          if [ -z "$DIGEST" ] || [ "$DIGEST" = "None" ]; then
            echo "::error::Could not resolve ECR image digest"
            exit 1
          fi
          echo "IMAGE_URI=${REPO_URL}@${DIGEST}" >> "$GITHUB_ENV"

      - name: Terraform plan (phase 1b — Lambda images from ECR digest)
        working-directory: terraform
        env:
          TF_VAR_api_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_worker_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_api_base_url: ""
          TF_VAR_frontend_url: ""
          TF_VAR_cors_allow_origin_primary: ""
        run: terraform plan -out=tfplan1b -input=false

      - name: Terraform apply (phase 1b, with retries)
        working-directory: terraform
        env:
          TF_VAR_api_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_worker_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_api_base_url: ""
          TF_VAR_frontend_url: ""
          TF_VAR_cors_allow_origin_primary: ""
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if terraform apply -auto-approve -input=false tfplan1b; then
              exit 0
            fi
            echo "Terraform apply phase 1b failed (attempt ${attempt}); backing off 30s..."
            sleep 30
          done
          exit 1

      - name: Verify SQS → Lambda mapping
        working-directory: terraform
        run: |
          set -euo pipefail
          FN="$(terraform output -raw planner_worker_lambda_name)"
          MAP_COUNT="$(aws lambda list-event-source-mappings --function-name "$FN" --query 'length(EventSourceMappings)' --output text)"
          if [ -z "$MAP_COUNT" ] || [ "$MAP_COUNT" = "0" ]; then
            echo "::error::No SQS event source mapping for worker $FN"
            exit 1
          fi

      - name: Resolve CloudFront URL for phase 2 (CORS + Lambda public URLs)
        id: public_urls
        working-directory: terraform
        run: |
          set -euo pipefail
          CF="$(terraform output -raw cloudfront_url)"
          echo "cloudfront_url=$CF" >> "$GITHUB_OUTPUT"

      - name: Terraform plan (phase 2 — lock CORS + API_BASE_URL to CloudFront)
        working-directory: terraform
        env:
          TF_VAR_api_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_worker_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_api_base_url: ${{ steps.public_urls.outputs.cloudfront_url }}
          TF_VAR_frontend_url: ${{ steps.public_urls.outputs.cloudfront_url }}
          TF_VAR_cors_allow_origin_primary: ${{ steps.public_urls.outputs.cloudfront_url }}
        run: terraform plan -out=tfplan2 -input=false

      - name: Terraform apply (phase 2, with retries)
        working-directory: terraform
        env:
          TF_VAR_api_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_worker_image_uri: ${{ env.IMAGE_URI }}
          TF_VAR_api_base_url: ${{ steps.public_urls.outputs.cloudfront_url }}
          TF_VAR_frontend_url: ${{ steps.public_urls.outputs.cloudfront_url }}
          TF_VAR_cors_allow_origin_primary: ${{ steps.public_urls.outputs.cloudfront_url }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if terraform apply -auto-approve -input=false tfplan2; then
              exit 0
            fi
            echo "Terraform apply phase 2 failed (attempt ${attempt}); backing off 30s..."
            sleep 30
          done
          exit 1

      - name: Terraform output JSON (infra contract)
        run: terraform -chdir=terraform output -json > "$GITHUB_WORKSPACE/infra.json"

      - name: Assert Terraform outputs (single source of truth for Next + deploy)
        id: infra
        env:
          NEXT_PUBLIC_API_ORIGIN: ${{ vars.NEXT_PUBLIC_API_ORIGIN }}
        run: |
          set -euo pipefail
          INFRA="$GITHUB_WORKSPACE/infra.json"
          need() {
            local jpath="$1"
            local name="$2"
            local v
            v="$(jq -e -r "${jpath}" "$INFRA")" || { echo "::error::Missing output: $name"; exit 1; }
            if [ -z "$v" ] || [ "$v" = "null" ]; then echo "::error::Empty output: $name"; exit 1; fi
            printf '%s' "$v"
          }
          API_BASE="$(need '.api_base_url.value' api_base_url)"
          CF_URL="$(need '.cloudfront_url.value' cloudfront_url)"
          APIGW="$(need '.api_gateway_url.value' api_gateway_url)"
          SQS_URL="$(need '.sqs_queue_url.value' sqs_queue_url)"
          S3_UI="$(jq -e -r '(.ui_bucket_name.value // .s3_bucket_ui.value // .s3_bucket.value)' "$INFRA")" || { echo "::error::Missing UI bucket output"; exit 1; }
          jq -e '.lambda_function_arns.value.api' "$INFRA" >/dev/null || { echo "::error::lambda_function_arns.api missing"; exit 1; }
          jq -e '.lambda_function_arns.value.planner_worker' "$INFRA" >/dev/null || { echo "::error::lambda_function_arns.planner_worker missing"; exit 1; }
          ORIGIN="${NEXT_PUBLIC_API_ORIGIN:-cloudfront}"
          case "$ORIGIN" in
            cloudfront) NEXT_PUBLIC_API_URL="$API_BASE" ;;
            apigateway) NEXT_PUBLIC_API_URL="$APIGW" ;;
            *)
              echo "::error::Invalid NEXT_PUBLIC_API_ORIGIN '${ORIGIN}'. Use cloudfront or apigateway."
              exit 1
              ;;
          esac
          {
            echo "api_base_url=$API_BASE"
            echo "cloudfront_url=$CF_URL"
            echo "api_gateway_url=$APIGW"
            echo "sqs_queue_url=$SQS_URL"
            echo "s3_bucket_ui=$S3_UI"
            echo "next_public_api_url=$NEXT_PUBLIC_API_URL"
          } >> "$GITHUB_OUTPUT"

      - name: Build frontend (production)
        working-directory: frontend
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ${{ steps.infra.outputs.next_public_api_url }}
          NEXT_PUBLIC_APP_URL: ${{ steps.infra.outputs.cloudfront_url }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}" ]; then
            echo "::error::Set repository secret NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"
            exit 1
          fi
          npm run build

      - name: Upload UI to S3 (sync, delete removed objects)
        env:
          S3_BUCKET: ${{ steps.infra.outputs.s3_bucket_ui }}
        run: aws s3 sync "$GITHUB_WORKSPACE/frontend/out/" "s3://${S3_BUCKET}/" --delete --region "${AWS_REGION}"

      - name: Invalidate CloudFront (after successful upload; with retries)
        working-directory: terraform
        run: |
          set -euo pipefail
          DIST="$(terraform output -raw cloudfront_distribution_id)"
          for i in 1 2 3; do
            if aws cloudfront create-invalidation --distribution-id "$DIST" --paths "/*" --no-cli-pager; then
              exit 0
            fi
            echo "CloudFront invalidation attempt $i failed; retrying in 15s..."
            sleep 15
          done
          echo "::error::CloudFront invalidation failed after 3 attempts"
          exit 1
